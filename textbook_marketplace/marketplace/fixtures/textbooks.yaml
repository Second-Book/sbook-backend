# Description templates for listings (varied condition descriptions in Serbian)
descriptions:
  - "Udžbenik u odličnom stanju, kao nov. Bez beleški i podvlačenja."
  - "Korišćen jedan semestar, minimalno oštećenje. Sve stranice cele."
  - "Dobro očuvan, ima nekoliko beleški olovkom koje se lako brišu."
  - "Knjiga u solidnom stanju, korišćena dve godine. Funkcionalna."
  - "Potpuno nova knjiga, nikad otvarana. Originalno pakovanje."
  - "Očuvana knjiga sa minimalnim tragovima korišćenja."
  - "Malo korišćena, bez podvlačenja. Korice u odličnom stanju."
  - "Knjiga u dobrom stanju, ima par podvlačenja markerom."
  - "Korišćena ali očuvana. Idealna za učenje, sve čitljivo."
  - "U veoma dobrom stanju, skoro kao nova. Preporučujem."
  - "Knjiga bez oštećenja, samo malo savijena prednja korica."
  - "Polovni udžbenik u korektnom stanju. Cena je po dogovoru."
  - "Očuvan primerak, korišćen pažljivo. Nema cepanja ni fleka."
  - "Udžbenik sa minimalnim tragovima upotrebe. Sve stranice na mestu."
  - "Kao nov, kupljen ali nikad korišćen. Prodajem jer mi ne treba."
